<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отдел Кадров • Поиск мастеров в Перми</title>
	<link rel="icon" href="./favicon.svg" type="image/svg+xml">
    
    <!-- PWA Manifest -->
    <!-- <link rel="manifest" href="manifest.json"> -->
    
    
    <!-- Font Awesome (иконки) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Наши стили -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header с поиском -->
    <header class="header">
        <div class="container">
            <div class="header__top">
                <div class="logo">
                    <h1 class="logo__text">Отдел Кадров</h1>
                </div>
                <span class="header__location">Пермь</span>
            </div>
            <div class="search">
                <i class="fas fa-search search__icon"></i>
                <input type="text" id="search" class="search__input" placeholder="Сантехник срочно...">
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="main">
        <div class="container">
            <!-- Фильтры -->
            <div class="filters">
                <select id="category" class="filter-select">
                    <option>Все услуги</option>
                    <option>Сантехника</option>
                    <option>Электрика</option>
                    <option>Ремонт</option>
                </select>
                <select id="price" class="filter-select">
                    <option>Все цены</option>
                    <option>До 1000₽</option>
                    <option>1000-3000₽</option>
                    <option>3000₽+</option>
                </select>
                <button id="filter-btn" class="filter-btn">
                    <i class="fas fa-filter"></i>
                    Фильтр
                </button>
            </div>

            <!-- Список услуг -->
            <div id="services" class="services-list"></div>
        </div>
    </main>

    <!-- Футер с юридическими ссылками -->
    <footer class="footer" style="
        padding: 2rem 0;
        background: rgba(15, 23, 42, 0.8);
        border-top: 1px solid var(--border-color);
        margin-top: 2rem;
    ">
        <div class="container">
            <div class="footer-content" style="
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
                text-align: center;
            ">
                <div class="footer-links" style="
                    display: flex;
                    flex-wrap: wrap;
                    justify-content: center;
                    gap: 1.5rem;
                    margin-bottom: 1rem;
                ">
                    <a href="privacy-policy.html" 
                       target="_blank" 
                       style="
                        color: var(--text-secondary);
                        text-decoration: none;
                        transition: color 0.2s;
                        font-size: 0.9rem;
                    " onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-secondary)'">
                        Политика конфиденциальности
                    </a>
                    <a href="terms-of-service.html" 
                       target="_blank" 
                       style="
                        color: var(--text-secondary);
                        text-decoration: none;
                        transition: color 0.2s;
                        font-size: 0.9rem;
                    " onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-secondary)'">
                        Пользовательское соглашение
                    </a>
                    <a href="data-processing-agreement.html" 
                       target="_blank" 
                       style="
                        color: var(--text-secondary);
                        text-decoration: none;
                        transition: color 0.2s;
                        font-size: 0.9rem;
                    " onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-secondary)'">
                        Согласие на обработку данных
                    </a>
                </div>
                
                <div class="footer-contact" style="
                    color: var(--text-muted);
                    font-size: 0.85rem;
                    margin-bottom: 1rem;
                ">
                    <p>По вопросам обработки данных: privacy@finderprofi.ru</p>
                </div>
                
                <div class="footer-copyright" style="
                    color: var(--text-muted);
                    font-size: 0.8rem;
                    opacity: 0.7;
                ">
                    <p>© 2026 Отдел Кадров. Сервис поиска специалистов в Перми.</p>
                    <p>Все права защищены. ИНН: [УКАЖИТЕ ВАШ ИНН]</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Модальное окно заказа -->
    <div id="order-modal" class="modal">
        <div class="modal__content">
            <div class="modal__header">
                <div class="modal__icon">
                    <i class="fas fa-check"></i>
                </div>
                <div>
                    <h3 class="modal__title">Оформить заказ</h3>
                    <p class="modal__subtitle">Комиссия 15%</p>
                </div>
            </div>
            
            <input type="text" id="service-name" class="modal__input" placeholder="Услуга">
            <input type="text" id="master-name" class="modal__input" placeholder="Мастер">
            <textarea id="description" class="modal__textarea" placeholder="Описание проблемы..."></textarea>
            
            <div class="modal__actions">
                <button id="submit-order" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i>
                    Заказать
                </button>
                <button id="close-modal" class="btn btn-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    
    <!-- Наши скрипты (модули) -->
    <script type="module" src="js/main.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
