<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель Отдела Кадров</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f172a; 
            color: white; 
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logo h1 {
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5rem;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        /* Инвайты */
        .invite-section {
            background: rgba(139, 92, 246, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        
        .invite-section h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .invite-section h2 i {
            color: #8b5cf6;
        }
        
        .invite-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .invite-stat {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        
        .invite-stat .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8b5cf6;
        }
        
        .invite-stat .label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }
        
        .invite-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .invite-code-display {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #c4b5fd;
            font-family: monospace;
            display: none;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .masters-table {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 1rem;
            background: rgba(255,255,255,0.08);
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .status.active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        
        .status.pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.85rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 6px;
            font-size: 0.85rem;
            margin: 0.125rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="logo">
                <i class="fas fa-tools" style="color: #3b82f6; font-size: 1.5rem;"></i>
                <h1>Отдел Кадров  |  Админ-панель</h1>
            </div>
            <div>
                <a href="/" class="btn" style="background: #3b82f6; color: white; text-decoration: none;">
                    <i class="fas fa-home"></i> На сайт
                </a>
            </div>
        </div>
        
        <div class="stats-cards">
            <div class="stat-card">
                <h3>Всего мастеров</h3>
                <div class="value" id="total-masters">0</div>
            </div>
            <div class="stat-card">
                <h3>Активные</h3>
                <div class="value" id="active-masters">0</div>
            </div>
            <div class="stat-card">
                <h3>На модерации</h3>
                <div class="value" id="pending-masters">0</div>
            </div>
            <div class="stat-card">
                <h3>Просмотры</h3>
                <div class="value" id="total-views">0</div>
            </div>
        </div>
        
        <!-- Секция инвайтов -->
        <div class="invite-section">
            <h2><i class="fas fa-key"></i> Инвайт-коды</h2>
            
            <div class="invite-stats">
                <div class="invite-stat">
                    <div class="value" id="invite-total">0</div>
                    <div class="label">Всего создано</div>
                </div>
                <div class="invite-stat">
                    <div class="value" id="invite-used">0</div>
                    <div class="label">Использовано</div>
                </div>
                <div class="invite-stat">
                    <div class="value" id="invite-active">0</div>
                    <div class="label">Активных</div>
                </div>
            </div>
            
            <div class="invite-actions">
                <button class="btn" onclick="createAdminInvite()"
                        style="background: #8b5cf6; color: white;">
                    <i class="fas fa-plus"></i> Создать инвайт
                </button>
                <div class="invite-code-display" id="invite-code-display">
                    <i class="fas fa-key"></i>
                    <span id="invite-code-value"></span>
                    <button class="btn btn-sm" onclick="copyInviteCode()"
                            style="background: rgba(255,255,255,0.1); color: white; margin-left: 1rem;">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="masters-table">
            <div id="masters-list" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Загрузка мастеров...
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.origin + '/api';
        
        // Загрузка статистики
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const stats = await response.json();
                
                document.getElementById('total-masters').textContent = stats.totalMasters || 0;
                document.getElementById('active-masters').textContent = stats.activeMasters || 0;
                document.getElementById('pending-masters').textContent = stats.pendingMasters || 0;
                document.getElementById('total-views').textContent = stats.ordersCount || 0;
                
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }
        
        // Загрузка списка мастеров
        async function loadMasters() {
            try {
                const response = await fetch(`${API_URL}/masters`);
                const masters = await response.json();
                
                if (masters.length === 0) {
                    document.getElementById('masters-list').innerHTML = 
                        '<div class="loading">Мастеров пока нет</div>';
                    return;
                }
                
                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя</th>
                                <th>Телефон</th>
                                <th>Услуги</th>
                                <th>Категории</th>
                                <th>Статус</th>
                                <th>Дата регистрации</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${masters.map(master => `
                                <tr>
                                    <td><code>${master.id}</code></td>
                                    <td><strong>${master.name}</strong></td>
                                    <td>
                                        <a href="tel:${master.phone}" style="color: #60a5fa; text-decoration: none;">
                                            ${master.phone}
                                        </a>
                                    </td>
                                    <td>${master.services?.substring(0, 50)}${master.services?.length > 50 ? '...' : ''}</td>
                                    <td>
                                        ${(master.categories || []).map(cat => 
                                            `<span class="category-badge">${cat}</span>`
                                        ).join('')}
                                    </td>
                                    <td>
                                        <span class="status ${master.status || 'pending'}">
                                            ${master.status === 'active' ? 'Активен' : 
                                              master.status === 'pending' ? 'На модерации' : 'Неактивен'}
                                        </span>
                                    </td>
                                    <td>${new Date(master.createdAt).toLocaleDateString('ru-RU')}</td>
                                    <td>
                                        <div class="action-buttons">
                                            ${master.status !== 'active' ? 
                                                `<button class="btn btn-success btn-sm" onclick="activateMaster('${master.id}')">
                                                    <i class="fas fa-check"></i> Активировать
                                                </button>` : ''
                                            }
                                            ${master.status === 'active' ?
                                                `<button class="btn btn-danger btn-sm" onclick="deactivateMaster('${master.id}')">
                                                    <i class="fas fa-ban"></i> Деактивировать
                                                </button>` : ''
                                            }
                                            <button class="btn btn-danger btn-sm" onclick="deleteMaster('${master.id}', '${master.name}')"
                                                    style="margin-left: 0.5rem;">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                            <button class="btn btn-sm" onclick="viewMaster('${master.id}')" 
                                                    style="background: #3b82f6; color: white;">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                document.getElementById('masters-list').innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки мастеров:', error);
                document.getElementById('masters-list').innerHTML = 
                    '<div class="loading" style="color: #ef4444;">Ошибка загрузки данных</div>';
            }
        }
        
        // Активация мастера
        async function activateMaster(masterId) {
            if (!confirm('Активировать этого мастера?')) return;
            
            try {
                const response = await fetch(`${API_URL}/masters/${masterId}/activate`, {
                    method: 'POST'
                });
                
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const result = await response.json();
                alert(result.message);
                loadMasters();
                loadStats();
                
            } catch (error) {
                alert('Ошибка активации: ' + error.message);
            }
        }
        
        async function deactivateMaster(masterId) {
            if (!confirm('Деактивировать этого мастера?')) return;
            
            try {
                const response = await fetch(`${API_URL}/masters/${masterId}/deactivate`, {
                    method: 'POST'
                });
                
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const result = await response.json();
                alert(result.message);
                loadMasters();
                loadStats();
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function deleteMaster(masterId, masterName) {
            if (!confirm(`УДАЛИТЬ мастера "${masterName}"?\nЭто действие нельзя отменить!`)) return;
            
            if (!confirm(`Точно удалить? Все данные мастера будут потеряны.`)) return;
            
            try {
                const response = await fetch(`${API_URL}/masters/${masterId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка сервера');
                }
                
                const result = await response.json();
                alert(`🗑️ ${result.message}`);
                
                loadMasters();
                loadStats();
                
            } catch (error) {
                alert(`❌ Ошибка удаления: ${error.message}`);
            }
        }
        
        function viewMaster(masterId) {
            alert(`Просмотр мастера ${masterId}\nДетальная информация будет здесь`);
        }
        
        function exportData() {
            const data = JSON.stringify(window.mastersData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quickfix-masters-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
        
        // ===== ИНВАЙТЫ =====
        
        // Загрузка статистики инвайтов
        async function loadInviteStats() {
            try {
                const response = await fetch(`${API_URL}/invites/stats`);
                const stats = await response.json();
                
                document.getElementById('invite-total').textContent = stats.totalInvites || 0;
                document.getElementById('invite-used').textContent = stats.usedInvites || 0;
                document.getElementById('invite-active').textContent = stats.activeInvites || 0;
                
            } catch (error) {
                console.error('Ошибка загрузки статистики инвайтов:', error);
            }
        }
        
        // Создание инвайта админом
        async function createAdminInvite() {
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Создание...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/invites/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ createdBy: 'admin' })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Показываем код
                    const display = document.getElementById('invite-code-display');
                    const value = document.getElementById('invite-code-value');
                    value.textContent = result.invite.code;
                    display.style.display = 'flex';
                    display.style.alignItems = 'center';
                    
                    // Обновляем статистику
                    loadInviteStats();
                    
                    // Автоскрытие через 30 секунд
                    setTimeout(() => {
                        display.style.display = 'none';
                    }, 30000);
                } else {
                    alert('Ошибка: ' + (result.error || 'Не удалось создать инвайт'));
                }
                
            } catch (error) {
                alert('Ошибка соединения с сервером');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        // Копирование кода в буфер
        function copyInviteCode() {
            const code = document.getElementById('invite-code-value').textContent;
            if (!code) return;
            
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target.closest('button');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 1500);
            }).catch(() => {
                alert('Не удалось скопировать. Код: ' + code);
            });
        }
        
        function startAutoRefresh() {
            setInterval(() => {
                loadStats();
                loadMasters();
                loadInviteStats();
            }, 30000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadMasters();
            loadInviteStats();
            startAutoRefresh();
            
            const header = document.querySelector('.admin-header');
            const exportBtn = document.createElement('button');
            exportBtn.className = 'btn';
            exportBtn.style.cssText = 'background: #8b5cf6; color: white; margin-left: 1rem;';
            exportBtn.innerHTML = '<i class="fas fa-download"></i> Экспорт';
            exportBtn.onclick = exportData;
            header.querySelector('div').appendChild(exportBtn);
        });
    </script>
</body>
</html>
